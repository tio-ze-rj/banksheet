<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect width="400" height="120" rx="16" fill="#0F1A2E"/>

  <!-- Sheet icon -->
  <rect x="24" y="22" width="46" height="56" rx="5" fill="#1D9E75" fill-opacity="0.15"/>
  <rect x="24" y="22" width="46" height="56" rx="5" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Corner fold -->
  <path d="M58 22 L70 34 L58 34 Z" fill="#0F1A2E"/>
  <path d="M58 22 L70 34" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Spreadsheet lines -->
  <line x1="30" y1="42" x2="64" y2="42" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
  <line x1="30" y1="51" x2="64" y2="51" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
  <line x1="30" y1="60" x2="50" y2="60" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
  <!-- Vertical column line -->
  <line x1="43" y1="36" x2="43" y2="70" stroke="#1D9E75" stroke-width="1" opacity="0.35"/>
  <!-- Export arrow -->
  <path d="M64 40 L78 40" stroke="#EF9F27" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <!-- PDF badge -->
  <rect x="24" y="22" width="18" height="10" rx="2" fill="#BA7517" fill-opacity="0.9"/>
  <text font-family="'Courier New', monospace" font-size="6" fill="#FAEEDA" x="26" y="30" font-weight="bold">PDF</text>

  <!-- Wordmark -->
  <text font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#F0EDE4" x="90" y="58">bank</text>
  <text font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#1D9E75" x="90" y="94">sheet</text>

  <!-- Tagline -->
  <text font-family="'Courier New', monospace" font-size="9" fill="#888780" x="90" y="112" letter-spacing="1">LOCAL · OPEN SOURCE · PRIVATE</text>

  <!-- MIT badge -->
  <rect x="356" y="14" width="32" height="16" rx="4" fill="#085041"/>
  <text font-family="'Courier New', monospace" font-size="8" fill="#9FE1CB" x="372" y="25" text-anchor="middle">MIT</text>
</svg>
